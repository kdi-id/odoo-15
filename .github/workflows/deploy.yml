name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Set up SSH for enterprise repo access
            sudo bash -c 'ssh-keyscan github.com >> /opt/odoo/.ssh/known_hosts 2>/dev/null'
            sudo bash -c 'echo "$0" > /opt/odoo/.ssh/deploy_key' "${{ secrets.ENTERPRISE_DEPLOY_KEY }}"
            sudo chown odoo:odoo /opt/odoo/.ssh/deploy_key /opt/odoo/.ssh/known_hosts
            sudo chmod 600 /opt/odoo/.ssh/deploy_key

            # Pull community addons
            sudo -u odoo bash -c 'cd /opt/odoo/odoo-15 && git pull origin main'

            # Pull enterprise addons (clone if first time)
            GIT_SSH='ssh -i /opt/odoo/.ssh/deploy_key -o StrictHostKeyChecking=no'
            if sudo -u odoo test -d /opt/odoo/enterprise-15; then
              sudo -u odoo bash -c "export GIT_SSH_COMMAND='$GIT_SSH' && cd /opt/odoo/enterprise-15 && git pull origin 15.0"
            else
              sudo -u odoo bash -c "export GIT_SSH_COMMAND='$GIT_SSH' && git clone --branch 15.0 --depth 1 git@github.com:odoo/enterprise.git /opt/odoo/enterprise-15"
            fi

            # Clean up deploy key
            sudo rm -f /opt/odoo/.ssh/deploy_key

            # Install any new Python dependencies (skip already-installed)
            sudo -u odoo /opt/odoo/venv/bin/pip install -q --no-deps -r /opt/odoo/odoo-15/requirements.txt 2>/dev/null || true

            # Restart Odoo
            sudo systemctl restart odoo

            # Wait and verify Odoo is running
            sleep 5
            if systemctl is-active --quiet odoo; then
              echo "Odoo restarted successfully"
            else
              echo "Odoo failed to start"
              sudo journalctl -u odoo --no-pager -n 20
              exit 1
            fi
